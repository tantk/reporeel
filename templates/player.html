<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__ — RepoReel</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #0a0a0f; color: #eee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  header { padding: 1rem 1.5rem; width: 100%; max-width: 960px; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 1rem; font-weight: 600; margin: 0; opacity: .8; }
  header button { background: transparent; color: #aaa; border: 1px solid #333; padding: .4rem .8rem;
                  border-radius: 6px; cursor: pointer; font: inherit; }
  header button:hover { color: #fff; border-color: #666; }
  main { width: 100%; max-width: 960px; padding: 0 1rem 2rem; flex: 1; display: flex; flex-direction: column; gap: 1rem; }
  .player { position: relative; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
  .player video { width: 100%; height: 100%; display: block; }
  .branches { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: .75rem; }
  .branches button { padding: 1rem 1.2rem; border-radius: 10px; border: 1px solid #2a2a3a;
                     background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff;
                     cursor: pointer; font: inherit; font-size: 1rem; text-align: left; transition: transform .1s; }
  .branches button:hover { transform: translateY(-2px); border-color: #4a4a8a; }
  .branches button .label-cta { display: block; font-weight: 600; }
  .branches button .label-hint { display: block; font-size: .8rem; opacity: .65; margin-top: .25rem; }
  .back { margin-top: .5rem; align-self: flex-start; background: transparent; color: #888;
          border: none; cursor: pointer; font: inherit; padding: .4rem .8rem; }
  .back:hover { color: #fff; }
  footer { padding: 1rem; font-size: .75rem; opacity: .4; }
</style>
</head>
<body>
<header>
  <h1>__TITLE__</h1>
  <button id="share">Copy link</button>
</header>
<main>
  <div class="player"><video id="vid" controls autoplay playsinline></video></div>
  <div id="controls"></div>
</main>
<footer>Built with RepoReel · HeyGen Hackathon 2026</footer>
<script>
const PLAN = __PLAN_JSON__;
const vid = document.getElementById('vid');
const controls = document.getElementById('controls');

function intro() { return PLAN.scenes[0]; }
function findScene(id) { return PLAN.scenes.find(s => s.id === id); }
function play(scene) {
  vid.src = 'scenes/' + scene.id + '.mp4';
  vid.load();
  vid.play().catch(() => {});
  controls.innerHTML = '';
  vid.onended = () => showOptions(scene);
}
function showOptions(currentScene) {
  if (currentScene.id === intro().id) {
    const branches = PLAN.scenes.slice(1);
    const div = document.createElement('div');
    div.className = 'branches';
    branches.forEach(s => {
      const b = document.createElement('button');
      b.innerHTML = '<span class="label-cta">' + s.cta_label + '</span><span class="label-hint">' + (s.title || '') + '</span>';
      b.onclick = () => play(s);
      div.appendChild(b);
    });
    controls.appendChild(div);
  } else {
    const b = document.createElement('button');
    b.className = 'back';
    b.textContent = '← Back to start';
    b.onclick = () => play(intro());
    controls.appendChild(b);
  }
}
play(intro());

document.getElementById('share').onclick = async () => {
  try {
    await navigator.clipboard.writeText(location.href);
    const btn = document.getElementById('share');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  } catch {}
};
</script>
</body>
</html>
